aid: transdigm
name: TransDigm Group
description: >-
  TransDigm Group is a leading global designer, producer, and supplier of highly
  engineered aerospace components, systems, and subsystems for use on nearly all
  commercial and military aircraft. The company operates 49 independent operating
  units producing proprietary, sole-source components including actuation systems,
  ignition systems, fuel systems, airframe and flight control components, cockpit
  security systems, seatbelts, airbags, pumps, valves, switches, and cockpit
  displays. TransDigm serves commercial airlines, defense OEMs, aerospace
  distributors, and the US Department of Defense.
