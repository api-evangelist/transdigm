  - type: Features
    data:
      - name: Actuation Systems
        description: Electromechanical and hydraulic actuators for flight control surfaces and landing gear.
      - name: Ignition Systems
        description: Aircraft ignition and engine starting systems for commercial and military turbine engines.
      - name: Fuel Systems
        description: Fuel pumps, valves, flow measurement, and management systems for aircraft.
      - name: Flight Control Components
        description: Control surface actuators, bellcranks, flight control cables, and mechanical components.
      - name: Cockpit Security Systems
        description: Armored cockpit doors, locking systems, and security hardware for commercial aircraft.
      - name: Passenger Safety Systems
        description: Seat belts, airbags, oxygen systems, and emergency equipment for aircraft cabins.
      - name: Avionics and Controls
        description: Cockpit displays, control panels, and avionic systems (via former Esterline businesses).
      - name: Sensors and Systems
        description: Pressure sensors, temperature sensors, and measurement systems for aerospace applications.
  - type: Solutions
    data:
      - name: Commercial Aerospace
        description: Proprietary components for commercial transport, regional, and business aircraft OEMs and aftermarket.
      - name: Defense and Military
        description: Sole-source components for US and allied military aircraft programs and defense OEMs.
      - name: Aerospace Aftermarket
        description: High-margin replacement parts and MRO components for the global commercial and military aftermarket.
  - type: UseCases
    data:
      - name: OEM Manufacturing
        description: Supplying proprietary components to aircraft OEMs during aircraft production.
      - name: Airline MRO
        description: Providing replacement and maintenance parts for commercial airline fleet maintenance.
      - name: Defense Programs
        description: Supplying sole-source components for US military aircraft sustainment programs.
